<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f0f2a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#6c5ce7" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" /><line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" /><line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" /><line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" /><line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" /><line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" /><line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" /><line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" /><line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="0" y1="0" x2="1200" y2="0" /><line x1="0" y1="60" x2="1200" y2="60" />
    <line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="180" x2="1200" y2="180" />
    <line x1="0" y1="240" x2="1200" y2="240" /><line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="360" x2="1200" y2="360" /><line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="480" x2="1200" y2="480" /><line x1="0" y1="540" x2="1200" y2="540" />
    <line x1="0" y1="600" x2="1200" y2="600" />
  </g>

  <!-- Glow orbs -->
  <circle cx="200" cy="300" r="180" fill="#6c5ce7" opacity="0.06" filter="url(#blur)"/>
  <circle cx="1000" cy="350" r="200" fill="#a29bfe" opacity="0.05" filter="url(#blur)"/>
  <circle cx="600" cy="150" r="120" fill="#00b894" opacity="0.04" filter="url(#blur)"/>

  <!-- Architecture diagram (right side) -->
  <g transform="translate(750, 150)" opacity="0.85">
    <!-- Boxes -->
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1.5"/>
    <text x="70" y="30" fill="#a29bfe" font-family="monospace" font-size="14" text-anchor="middle">Scheduler</text>

    <rect x="180" y="0" width="140" height="50" rx="8" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1.5"/>
    <text x="250" y="30" fill="#a29bfe" font-family="monospace" font-size="14" text-anchor="middle">Tools</text>

    <rect x="0" y="120" width="140" height="50" rx="8" fill="#1a1a2e" stroke="#00b894" stroke-width="1.5"/>
    <text x="70" y="150" fill="#00b894" font-family="monospace" font-size="14" text-anchor="middle">Memory</text>

    <rect x="180" y="120" width="140" height="50" rx="8" fill="#1a1a2e" stroke="#fdcb6e" stroke-width="1.5"/>
    <text x="250" y="150" fill="#fdcb6e" font-family="monospace" font-size="14" text-anchor="middle">Planner</text>

    <!-- Connecting lines -->
    <line x1="140" y1="25" x2="180" y2="25" stroke="#6c5ce7" stroke-width="1" opacity="0.6"/>
    <line x1="70" y1="50" x2="70" y2="120" stroke="#6c5ce7" stroke-width="1" opacity="0.6"/>
    <line x1="250" y1="50" x2="250" y2="120" stroke="#6c5ce7" stroke-width="1" opacity="0.6"/>
    <line x1="140" y1="145" x2="180" y2="145" stroke="#00b894" stroke-width="1" opacity="0.6"/>

    <!-- Diagonal connections -->
    <line x1="140" y1="50" x2="180" y2="120" stroke="#a29bfe" stroke-width="0.5" opacity="0.3" stroke-dasharray="4,4"/>
    <line x1="140" y1="120" x2="180" y2="50" stroke="#a29bfe" stroke-width="0.5" opacity="0.3" stroke-dasharray="4,4"/>

    <!-- Center node -->
    <circle cx="160" cy="85" r="20" fill="#1a1a2e" stroke="#a29bfe" stroke-width="1.5"/>
    <text x="160" y="90" fill="#a29bfe" font-family="monospace" font-size="11" text-anchor="middle">OS</text>

    <!-- Lines to center -->
    <line x1="70" y1="50" x2="145" y2="72" stroke="#a29bfe" stroke-width="0.5" opacity="0.4"/>
    <line x1="250" y1="50" x2="175" y2="72" stroke="#a29bfe" stroke-width="0.5" opacity="0.4"/>
    <line x1="70" y1="120" x2="145" y2="98" stroke="#a29bfe" stroke-width="0.5" opacity="0.4"/>
    <line x1="250" y1="120" x2="175" y2="98" stroke="#a29bfe" stroke-width="0.5" opacity="0.4"/>

    <!-- Label below -->
    <text x="160" y="210" fill="#8888a0" font-family="monospace" font-size="11" text-anchor="middle">Elixir/OTP Reference Implementation</text>
  </g>

  <!-- Title area (left side) -->
  <g transform="translate(80, 140)">
    <!-- Overline -->
    <rect x="0" y="0" width="60" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="70" y="6" fill="#8888a0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="2">RESEARCH SERIES</text>

    <!-- Main title -->
    <text x="0" y="70" fill="#e4e4ef" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700">The AI</text>
    <text x="0" y="130" fill="url(#accent)" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700">Operating System</text>

    <!-- Subtitle -->
    <text x="0" y="175" fill="#8888a0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400">Functional Design Patterns for</text>
    <text x="0" y="200" fill="#8888a0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400">Intelligent Agent Infrastructure</text>

    <!-- Tags -->
    <rect x="0" y="230" width="85" height="28" rx="14" fill="rgba(108,92,231,0.12)" stroke="#6c5ce7" stroke-width="0.5"/>
    <text x="42" y="249" fill="#a29bfe" font-family="monospace" font-size="12" text-anchor="middle">5 Papers</text>

    <rect x="100" y="230" width="75" height="28" rx="14" fill="rgba(0,184,148,0.12)" stroke="#00b894" stroke-width="0.5"/>
    <text x="137" y="249" fill="#00b894" font-family="monospace" font-size="12" text-anchor="middle">Elixir</text>

    <rect x="190" y="230" width="62" height="28" rx="14" fill="rgba(253,203,110,0.12)" stroke="#fdcb6e" stroke-width="0.5"/>
    <text x="221" y="249" fill="#fdcb6e" font-family="monospace" font-size="12" text-anchor="middle">OTP</text>

    <rect x="267" y="230" width="115" height="28" rx="14" fill="rgba(108,92,231,0.12)" stroke="#6c5ce7" stroke-width="0.5"/>
    <text x="324" y="249" fill="#a29bfe" font-family="monospace" font-size="12" text-anchor="middle">Open Source</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0a0a12"/>
  <rect x="0" y="578" width="1200" height="2" fill="url(#accent)" opacity="0.3"/>

  <text x="80" y="610" fill="#8888a0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">YonedaAI Research Collective</text>
  <text x="1120" y="610" fill="#8888a0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" text-anchor="end">github.com/AgentHeroWork/agent-os</text>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" opacity="0.6"/>
</svg>
