app = "agent-os"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]

[env]
  AGENT_OS_PORT = "4000"
  RELEASE_DISTRIBUTION = "sname"
  RELEASE_NODE = "agent_os"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/api/v1/health"
  timeout = "5s"

[mounts]
  source = "mnesia_data"
  destination = "/data/mnesia"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
